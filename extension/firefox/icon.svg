<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Dual Pi-hole Control icon: two Pi-hole "holes" above a toggle switch. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#283357"/>
      <stop offset="1" stop-color="#121829"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6a4d"/>
      <stop offset="1" stop-color="#c8102e"/>
    </linearGradient>
  </defs>

  <!-- rounded background -->
  <rect x="4" y="4" width="120" height="120" rx="26" fill="url(#bg)"/>

  <!-- two overlapping Pi-hole "holes" -->
  <circle cx="49" cy="47" r="21" fill="none" stroke="url(#ring)" stroke-width="9"/>
  <circle cx="79" cy="47" r="21" fill="none" stroke="url(#ring)" stroke-width="9"/>

  <!-- toggle switch in the "off" position (blocking disabled) -->
  <rect x="33" y="79" width="62" height="28" rx="14" fill="#0e1322"/>
  <circle cx="47" cy="93" r="10" fill="#ff6a4d"/>
</svg>
